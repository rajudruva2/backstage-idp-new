
app:
  baseUrl: https://backstage.rajplatform.online

backend:
  baseUrl: https://backstage.rajplatform.online
  listen: ':7007'

  cors:
    origin: https://backstage.rajplatform.online
    methods: [GET, POST, PUT, DELETE]
    credentials: true

  database:
    client: better-sqlite3
    connection:
    directory: /tmp/backstage-db

auth:
  environment: production

  providers:
    github:
      production:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}

        signIn:
          resolvers:
            - resolver: dangerouslyAllowSignInWithoutUserInCatalog

permission:
  enabled: true

catalog:
  locations:
    # Example entities
    - type: file
      target: ./examples/entities.yaml

    # Example templates
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]

    # Example users/groups
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

kubernetes:
  serviceLocatorMethod:
    type: multiTenant

  clusterLocatorMethods:
    - type: config
      clusters:
        - url: https://kubernetes.default.svc
          name: eks-cluster
          authProvider: serviceAccount
          skipTLSVerify: false
          skipMetricsLookup: false

techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

scaffolder:

argocd:
  baseUrl: https://argocd.rajplatform.online
